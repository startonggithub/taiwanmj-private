		var longpress = false;

		var handler = null;

		var cancel = function(e) {
			if (presstimer !== null) {
				clearTimeout(presstimer);
				presstimer = null;
				handler = null;
			}
		};

		var start = function(e) {
			if (e.type === 'click' && e.button !== 0) {
				return false;
			}

			longpress = false;
			handler = this;

			if (presstimer === null) {
				presstimer = setTimeout(function() {
					setLastTile(handler.id);
					longpress = true;
				}, 400);
			}

			return false;
		};

			if (presstimer !== null) {
				clearTimeout(presstimer);
				presstimer = null;
				handler = null;
			}

			if (longpress) {
				return false;
			}

			setCurrentTile(this.id);
		});

		$('#sets').find('img').each(function () {
			this.addEventListener('mousedown', start);
			this.addEventListener('touchstart', start);

			}

			//////////////////////////////////////////三元四喜類
			var windCount = 0;
			var dragonCount = 0;
			var hasWindPairs = false;
			var hasDragonPairs = false;
			for (var i = 0; i < completeSet.length; i ++) {
				if (completeSet[i][4] == 'wind') {
					windCount ++;
					if (completeSet[i][3] == 'pairs') hasWindPairs = true;
				}
				if (completeSet[i][4] == 'dragon') {
					dragonCount ++;
					if (completeSet[i][3] == 'pairs') hasDragonPairs = true;
				}
			}

			//小三元 T001
			//大三元 T002
			if (dragonCount == 3) {
				if (hasDragonPairs) results.push('T001:');
				else results.push('T002:');
			}

			//小三風 T003
			//小四喜 T005
			//大三風 T004
			//大四喜 T006		
			if (windCount >= 3) {
				if (hasWindPairs) {
					if (windCount == 3) results.push('T003:');
					else if (windCount == 4) results.push('T005:');
				}
				else {
					if (windCount == 3) results.push('T004:');
					else if (windCount == 4) results.push('T006:');
				}
			}

			//////////////////////////////////////////大牌類
			//對對胡 U001
			if (specialPattern == 0 && eatCount == 0) results.push('U001:');

			//混一色 U002
			//清一色 U003
			if (hasDragonWind(game.tiles) &&
				((hasPin(game.tiles) && ! hasBamboo(game.tiles) && ! hasMan(game.tiles)) ||
				 (! hasPin(game.tiles) && hasBamboo(game.tiles) && ! hasMan(game.tiles)) ||
				 (! hasPin(game.tiles) && ! hasBamboo(game.tiles) && hasMan(game.tiles))
				)
			   ) {
				results.push('U002:');
			}
			else if (getCategory(game.tiles, allPins).length == 17 || getCategory(game.tiles, allBamboos).length == 17 || 
					 getCategory(game.tiles, allMans).length == 17 || getCategory(game.tiles, allDragonsWinds).length == 17) { 
				results.push('U003:');
			}

			//////////////////////////////////////////不正常胡牌類
			//嚦咕嚦咕 V001
			//嚦咕八飛 V002
			if (specialPattern == 3 || specialPattern == 4) {
				if (specialPattern == 3) results.push('V001:');
				else if (specialPattern == 4) results.push('V002:');
				
				//嚦咕四歸一 V003
				var occurence = countOccurence(game.tiles);
				for (var i = 0; i < occurence[0].length; i ++) {
					if (occurence[1][i] == 4) results.push('V003:');
				}
				//嚦咕連對 V004
				var consecutive = countConsecutive3OrMore(occurence[0]);
				for (var j = 0; j < consecutive.length; j ++) {
					results.push('V004:' + consecutive[j]);
				}
			}

			//十六不搭三相逢 V007
			//十六不搭暗雜龍 V006
			//十六不搭 V005
			if (specialPattern == '2') {
				//retrieve digits for allPins, allBamboos, allMans
				var pinTiles    = getCategory(game.tiles, allPins);
				var bambooTiles = getCategory(game.tiles, allBamboos);
				var manTiles    = getCategory(game.tiles, allMans);

				pinTiles    = arrayUnique(pinTiles);
				bambooTiles = arrayUnique(bambooTiles);
				manTiles    = arrayUnique(manTiles);

				pinTiles    = retrieveDigits(pinTiles).sort();
				bambooTiles = retrieveDigits(bambooTiles).sort();
				manTiles    = retrieveDigits(manTiles).sort();

				if (isEqual(pinTiles, bambooTiles) && isEqual(bambooTiles, manTiles) && isEqual(pinTiles, manTiles)) 
					results.push('V007:');
				else if (isEqual(pinTiles.concat(bambooTiles, manTiles).sort(), oneDragon))
					results.push('V006:');
				else 
					results.push('V005:');
			}

			//////////////////////////////////////////奇牌類
			//天聽 W004
			//地聽 W005
			//人聽 W006
			if (game.skyHear == '1') results.push('W004:');
			else if (game.earthHear == '1') results.push('W005:');
			else if (game.humanHear == '1') results.push('W006:');

			//天胡 W001
			//地胡 W002
			//人胡 W003
			if (game.skyGame == '1') results.push('W001:');
			else if (game.earthGame == '1') results.push('W002:');
			else if (game.humanGame == '1') results.push('W003:');

		//
		//Remove contradict elements
		//
			//暗間食糊牌 不再計對碰 
			if (notCountO004) results = removeElement(results, 'O004');
			//對碰 不再計假獨 (如有)
			else if (containElement(results, 'O004')) results = removeElement(results, 'O002');

			//無字花大平胡 不再計無字花
			if (containElement(results, 'K002')) results = removeElement(results, 'C004');
			//簡簡胡 不再計門清一摸五、對對胡
			if (containElement(results, 'J005')) {
				results = removeElement(results, 'O007'); 
				results = removeElement(results, 'U001');
			}
			//缺一門 不再計無字
			if (containElement(results, 'O012')) results = removeElement(results, 'D001');
			//花／槓上自摸 花／槓上 x N 自摸 不再計自摸
			if (containElement(results, 'E003') || containElement(results, 'E004')) results = removeElement(results, 'O005');
			//全求 不再計自摸、獨獨
			if (containElement(results, 'Q001')) {
				results = removeElement(results, 'O005'); 
				results = removeElement(results, 'O001');
			}
			//半求 不再計獨獨
			if (containElement(results, 'Q002')) results = removeElement(results, 'O001'); 
			//斷么 不再計無字
			if (containElement(results, 'S003')) results = removeElement(results, 'D001');
			//全帶么 不再計無字
			if (containElement(results, 'S005')) results = removeElement(results, 'D001');
			//全么 不再計老少碰、兄弟碰、對對胡、全帶么
			if (containElement(results, 'S007')) {
				results = removeElement(results, 'S002'); 
				results = removeElement(results, 'S005'); 
				results = removeElement(results, 'H001');
				results = removeElement(results, 'H002'); 
				results = removeElement(results, 'H003');
				results = removeElement(results, 'U001');
			}
			//花么 不再計對對胡、半帶么
			if (containElement(results, 'S006')) {
				results = removeElement(results, 'S004'); 
				results = removeElement(results, 'U001');
			}
			//十三么 不再計門清，如自摸不計門清一摸五，只計自摸
			if (containElement(results, 'S008')) {
				results = removeElement(results, 'O006');
				if (containElement(results, 'O007')) {
					results = removeElement(results, 'O007');
					results.push('O005:');
				}
			}
			//小三元 大三元 不再計中發白碰
			if (containElement(results, 'T001') || containElement(results, 'T002')) results = removeElement(results, 'D005');
			//小三風 小四喜 大三風 大四喜 不再計東南西北碰
			if (containElement(results, 'T003') || containElement(results, 'T004') || 
			    containElement(results, 'T005') || containElement(results, 'T006')) {
				results = removeElement(results, 'D002');
				results = removeElement(results, 'D003');
				results = removeElement(results, 'D004');
			}
			//清一色 不再計無字
			if (containElement(results, 'U003')) {
				results = removeElement(results, 'D001');
			}
			//嚦咕嚦咕 嚦咕八飛 不再計門清，如自摸不計門清一摸五，只計自摸
			if (containElement(results, 'V001') || containElement(results, 'V002')) {
				results = removeElement(results, 'O006');
				if (containElement(results, 'O007')) {
					results = removeElement(results, 'O007');
					results.push('O005:');
				}				
			}
			//嚦咕四歸一 不計嚦咕八飛 只計嚦咕嚦咕
			if (containElement(results, 'V003')) {
				if (containElement(results, 'V002')) {
					results = removeElement(results, 'V002');
					results.push('V001:');
				}				
			}
			//十六不搭 十六不搭三相逢 十六不搭暗雜龍 不再計門清，如自摸不計門清一摸五，只計自摸
			if (containElement(results, 'V005') || containElement(results, 'V006') || containElement(results, 'V007')) {
				results = removeElement(results, 'O006');
				if (containElement(results, 'O007')) {
					results = removeElement(results, 'O007');
					results.push('O005:');
				}				
			}
			//天聽 地聽 人聽 不再計門清
			if (containElement(results, 'W004') || containElement(results, 'W005') || containElement(results, 'W006')) results = removeElement(results, 'O006');
			//天胡 不再計門清一摸五
			if (containElement(results, 'W001')) results = removeElement(results, 'O007');
			//地胡 不再計門清一摸五、天聽
			if (containElement(results, 'W002')) {results = removeElement(results, 'O007'); results = removeElement(results, 'W004');}
			//人胡 不再計門清、天聽、地聽、人聽
			if (containElement(results, 'W003')) {
				results = removeElement(results, 'O006'); 
				results = removeElement(results, 'W004');
				results = removeElement(results, 'W005'); 
				results = removeElement(results, 'W006');
			}


		//
		//Last checking 
		//
			//////////////////////////////////////////胡牌形式類
			//大雞胡 O011
			if (results.length == 1 && (containElement(results, 'C001') || containElement(results, 'C002'))) {
				results = [];
				results.push('O011:');
			}
			//////////////////////////////////////////底
			//底 B001
			results.push('B001:');

			results.sort();

		//
		// Construct results
		//
			$("#table-result-points-1").empty();
			$("#table-result-points-2").empty();
			$("#table-result-points-3").empty();

			var totalPoints = 0;
			var totalPointsWithoutJon = 0;
			var totalCount = 0;
			
			for (var i = 0; i < results.length; i ++) {
				var code = results[i].split(':')[0];
				var parm = results[i].split(':')[1];
				var points = localStorage.getItem(code);
				var protect = localStorage.getItem(code + 'protect');

				//Skip items with point blank or 0 (except protect = 'Y')
				if (protect == 'Y' || (points != '' && parseInt(points) > 0)) {
					//Hard-code formula
					//花／槓上 x N 自摸
					if (code == 'E004') points = 10 * (parseInt(parm) - 1);
					//拉莊
					else if (code == 'P002') points = 2 * parseInt(parm) + 1;
					//嚦咕連對
					else if (code == 'V004') points = 5 * (parseInt(parm) - 2);
					//三相逢 四相逢 五相逢
					//三般高 四般高
					//四歸一 四歸三 四歸四
					else if (code == 'F002' || code == 'F003' || code == 'F004' || 
							 code == 'G002' || code == 'G003' || 
							 code == 'M001' || code == 'M002' || code == 'M003') {
						if (parm == '暗') points = parseInt(points) * 2;
					}
					//不正花 正花 
					else if (code == 'C002' || code == 'C003') points = parseInt(points) * parseInt(parm);

					var tr = $('<tr/>');
					tr.append('<td style="width:80%;">' + localStorage.getItem(code + 'name') + ' ' + parm + '</td>');
					tr.append('<td style="width:20%;text-align:right;">' + points + '</td>');
					
					totalPoints = totalPoints + parseInt(points);
					if (code != 'P001' && code != 'P002') totalPointsWithoutJon = totalPointsWithoutJon + parseInt(points);
					totalCount ++;

					//minimum list 5 items each column 
					if (totalCount <= 5) $("#table-result-points-1").append(tr);
					else if (totalCount <= 5 * 2) $("#table-result-points-2").append(tr);
					else $("#table-result-points-3").append(tr);
				}
			}

			//自摸加食莊要細分
			if (game.winType == 'win-type-1' && game.jon2 == '1')
				$('#message').text('總番數 : ' + totalPointsWithoutJon + ' (莊) ' + totalPoints);
			else
				$('#message').text('總番數 : ' + totalPoints);

			$('#totalPoints').val(totalPoints);
			$('#totalPointsWithoutJon').val(totalPointsWithoutJon);

			$('#tiles').toggle(false);
			$('#results').toggle(true);
		}

        function isPong(arr) {
            if (arr[0] == arr[1] && arr[1] == arr[2] && arr[0] == arr[2]) return true;

            return false;
        }

        function isEat(arr) {
			if (hasDragonWind(arr)) return false;

            var result = arr.sort();
            if ((parseInt(result[0]) + 1) == parseInt(result[1]) && (parseInt(result[1]) + 1) == parseInt(result[2])) return true;

            return false;
		}
		
		//return the first pong tile
		function findFirstPongTile(arr) {
			var result = countOccurence(arr);
			for (var i = 0; i < result[1].length; i ++) {
				if (result[1][i] == 3) return result[0][i];
			}

			return "";
		}

        function countMoreThan4(game, set) {
			var fullTiles = game.tiles.slice(0,17);
			
			for (var i = 0; i < set.length; i ++) {
				if (set[i][2] == '1') fullTiles.push(set[i][0][0]);
			}
			fullTiles = fullTiles.sort();

			var occurence = countOccurence(fullTiles);

        	function filterMoreThan4(value) {
            	return value > 4;
        	}
			return occurence[1].filter(filterMoreThan4).length > 0 ? true : false;
		}
		
		function countOccurence(tiles) {
			var element = [];
			var occurence = [];
			var result = [];
			var array = tiles.slice().sort();

            for (var i = 0; i < array.length; i++) {
				if (! element.includes(array[i])) {
					element.push(array[i]);
					occurence.push(array.count(array[i]));
				}
			}

			result.push(element);
			result.push(occurence);

			return result;
		}

		function countConsecutive3OrMore(tiles) {
			var result = [];
			var array = tiles.slice().sort();
			var count = 1;

            for (var i = 0; i < array.length - 1; i++) {
				if ((parseInt(array[i + 1]) - parseInt(array[i])) == 1) 
					count ++;
				else {
					if (count >= 3) result.push(count);
					count = 1;
				}
			}
			if (count >= 3) result.push(count);

			return result;
		}

		function retrieveDigits(tiles) {
			var result = [];
			var array = tiles.slice().sort();
			var digit = '';

            for (var i = 0; i < array.length; i++) {
				//count only allPins, allBamboos, allMans
				if (! allDragonsWinds.includes(array[i])) {
					digit = array[i].toString().split('').pop();
					result.push(parseInt(digit));
				}
				else {
					result.push(0);
				}
			}

			return result;
		}

		function arrayUnique(array) {
        	var a = array.concat();
        	for(var i=0; i<a.length; ++i) {
            	for(var j=i+1; j<a.length; ++j) {
                	if(a[i] === a[j])
                    	a.splice(j--, 1);
	            }
    	    }
    
	        return a.sort();
    	}    

		function hasPin(tiles) {
			return tilesContain(tiles, allPins);
		}

		function hasBamboo(tiles) {
			return tilesContain(tiles, allBamboos);
		}

		function hasMan(tiles) {
			return tilesContain(tiles, allMans);
		}

		function hasWind(tiles) {
			return tilesContain(tiles, allWinds);
		}

		function hasDragon(tiles) {
			return tilesContain(tiles, allDragons);
		}

		function hasFlower(tiles) {
			return tilesContain(tiles, allFlowers);
		}

		function hasSeason(tiles) {
			return tilesContain(tiles, allSeasons);
		}

		function hasDragonWind(tiles) {
			return tilesContain(tiles, allDragonsWinds);
		}

		function tilesContain(tiles, category) {
			var results = getCategory(tiles, category);
			if (results.length > 0) return true;
			else return false;
		}

		function getCategory(tiles, category) {
			var results = tiles.slice();

        	function filterCategory(value) {
            	return category.includes(value);
        	}
        	return results.filter(filterCategory);
		}

		function removeElement(array, element) {
			function filterElement(value) {
                return (value.split(':')[0] != element);
            };
			return array.filter(filterElement);
		}

		function containElement(array, element) {
			var results = array.slice();

			function filterElement(value) {
                return (value.split(':')[0] == element);
			};
			results = results.filter(filterElement);

			return (results.length > 0) ? true : false;
		}

		//structure 
		// tile
		// isOpen
		// isGong
		// type (eat,pong,pairs)
		// category (pin,bamboo,man,wind,dragon)
		// numbers for pin,bamboo,man
		function insertCompleteSet(set, part, isOpen, isGong) {
			var type = '', category = '', numbers = [];

			if (isPong(part)) type = 'pong';
			else if (isEat(part)) type = 'eat';
			else if (part.length == 2 && part[0] == part[1]) type = 'pairs';

			if (hasPin(part)) category = 'pin';
			else if (hasBamboo(part)) category = 'bamboo';
			else if (hasMan(part)) category = 'man';
			else if (hasWind(part)) category = 'wind';
			else if (hasDragon(part)) category = 'dragon';

			if (category == 'pin' || category == 'bamboo' || category == 'man') {
				numbers = retrieveDigits(part);
			}

			set.push(new Array(part.sort(), isOpen, isGong, type, category, numbers.sort()));
		}

		function isEqual(value, other) {
			// Get the value type
			var type = Object.prototype.toString.call(value);

			// If the two objects are not the same type, return false
			if (type !== Object.prototype.toString.call(other)) return false;

			// If items are not an object or array, return false
			if (['[object Array]', '[object Object]'].indexOf(type) < 0) return false;

			// Compare the length of the length of the two items
			var valueLen = type === '[object Array]' ? value.length : Object.keys(value).length;
			var otherLen = type === '[object Array]' ? other.length : Object.keys(other).length;
			if (valueLen !== otherLen) return false;

			// Compare two items
			var compare = function (item1, item2) {
				// Get the object type
				var itemType = Object.prototype.toString.call(item1);

				// If an object or array, compare recursively
				if (['[object Array]', '[object Object]'].indexOf(itemType) >= 0) {
					if (!isEqual(item1, item2)) return false;
				}
				// Otherwise, do a simple comparison
				else {
					// If the two items are not the same type, return false
					if (itemType !== Object.prototype.toString.call(item2)) return false;

					// Else if it's a function, convert to a string and compare
					// Otherwise, just compare
					if (itemType === '[object Function]') {
						if (item1.toString() !== item2.toString()) return false;
					} else {
						if (item1 !== item2) return false;
					}
				}
			};

			// Compare properties
			if (type === '[object Array]') {
				for (var i = 0; i < valueLen; i++) {
					if (compare(value[i], other[i]) === false) return false;
				}
			} else {
				for (var key in value) {
					if (value.hasOwnProperty(key)) {
						if (compare(value[key], other[key]) === false) return false;
					}
				}
			}

			// If nothing failed, return true
			return true;
		}

        Array.prototype.count = function(obj){
            var count = this.length;
            if(typeof(obj) !== "undefined"){
                var array = this.slice(0), count = 0; // clone array and reset count
                for(i = 0; i < array.length; i++){
                    if(array[i] == obj){
                        count++;
                    }
                }
            }
            return count;
		}
