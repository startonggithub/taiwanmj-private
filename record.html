<script>
	function stepUpDown(id, step) {
		const input = document.getElementById(id);
		let value = parseInt(input.value || 0);
		input.value = value + step;
	}	
</script>

	<script type="text/javascript">
		var rowNumberFrom = 1;
		var rowNumberTo = 0;
		var winnerList = '';
		var winnerName = '';
		var loserList = '';
		var loserName = '';

		var uuid = localStorage.getItem('gameDataId');

		var snapShotTransaction;

		//force reload to fix the problem of not loading sometimes after back from point screen in Safari case 
		window.onpageshow = function(event) {
			if (event.persisted) {
				window.location.reload()
			}
		};

		$(document).ready(function () {
			initialize();
		})

		function initialize () {
			if (appCategory == 'free' || appCategory == 'paid' || appCategory == 'web') {
				//Disable mouse right click
				$('body').on('contextmenu',function(e){
					return false;
				});
			}

			resize();
			window.addEventListener('resize', resize);

			$('#' + localStorage.getItem('currentWind')).addClass('active');
			$('#' + localStorage.getItem('currentPosition')).addClass('highlightedBlue');

			setWindPosition();

			//Clean up null storage 
			if (localStorage.length == 1 && localStorage.getItem(0) == null) localStorage.clear();

			//Construct page if information saved before 
			if (localStorage.getItem('gameDataId') != null) {
				for (var i = 0; i < allPlayers.length; i ++) {
					$('#' + allPlayers[i] + '-player-input').val(localStorage.getItem(allPlayers[i] + '-player-input'));
					$('#' + allPlayers[i] + '-scores').text(localStorage.getItem(allPlayers[i] + '-scores'));
					if (parseInt($('#' + allPlayers[i] + '-scores').text()) >= 0) $('#' + allPlayers[i] + '-scores').css('color','#3399FF');
					else $('#' + allPlayers[i] + '-scores').css('color','red');

					var consecutiveWin = localStorage.getItem(allPlayers[i] + '-consecutive-win');
					if (consecutiveWin == null || consecutiveWin == '') consecutiveWin = '0';
					$('#' + allPlayers[i] + '-consecutive-win').val(parseInt(consecutiveWin));
					$('#' + allPlayers[i] + '-consecutive-win-label').text(consecutiveWin == '0' ? '' : '連 ' + consecutiveWin);
				}

				addPlayers();

				//Reset global row number
				rowNumberFrom = localStorage.getItem('rowNumberFrom') == null ? 1 : parseInt(localStorage.getItem('rowNumberFrom'));
				rowNumberTo = localStorage.getItem('rowNumberTo') == null ? 0 : parseInt(localStorage.getItem('rowNumberTo'));

				for (var i = rowNumberFrom; i <= rowNumberTo; i++) {
					addRow(i, localStorage.getItem(i + '#mode'), 'Y');
				}

				for (var i = rowNumberFrom; i <= rowNumberTo; i++) {
					//set values
					$('#table-scores #' + i + ' #winner-list').val(localStorage.getItem(i + '#winner-list'));
					$('#table-scores #' + i + ' #loser-list').val(localStorage.getItem(i + '#loser-list'));

					for (var j = 0; j < allPairs.length; j++) { 
						restoreRow (i, allPairs[j]);

						//set protect fields
						if ($('#table-scores #' + i + ' #' + allPairs[j] + '-score').val() == '' || parseInt($('#table-scores #' + i + ' #' + allPairs[j] + '-score').val()) <= 0 || $('#table-scores #' + i + ' #' + allPairs[j] + '-confirm').val() == 'Y') {
							markProtect(i, allPairs[j]);
						};

						//set topup fields
						if ($('#table-scores #' + i + ' #' + allPairs[j] + '-score').val() == '0' || parseInt($('#table-scores #' + i + ' #' + allPairs[j] + '-win').val()) > 1) {
							$('#table-scores #' + i + ' #' + allPairs[j] + '-score').css('color','blue');						
						};

						//set revenge fields
						if ($('#table-scores #' + i + ' #' + allPairs[j] + '-rev').val() == 'Y') {
							$('#table-scores #' + i + ' #' + allPairs[j] + '-score').css('color', 'red');
						};
					}
				}

				markWinnerLoser();

				//document.getElementById('bottom-buttons').scrollIntoView();	//scroll to bottom 
			}
			else {
				onClickJoin();
			}

			if (localStorage.getItem('checkbox-calc') == 'true') $('#checkbox-calc').prop('checked', true);
			
			//if return from point.html, call onClickAdd() to update the points
			if (sessionStorage.getItem('calcUsingPointHtml') == 'return') {
				onClickAdd();
			}
		}

		function restoreRow(r, c) {
			$('#table-scores #' + r + ' #' + c + '-score').val(localStorage.getItem(r + '#' + c + '-score'));
			$('#table-scores #' + r + ' #' + c + '-score-original').val(localStorage.getItem(r + '#' + c + '-score-original'));
			$('#table-scores #' + r + ' #' + c + '-confirm').val(localStorage.getItem(r + '#' + c + '-confirm'));
			$('#table-scores #' + r + ' #' + c + '-win').val(localStorage.getItem(r + '#' + c + '-win'));
			$('#table-scores #' + r + ' #' + c + '-rev').val(localStorage.getItem(r + '#' + c + '-rev'));
		}

		function anythingInCommon(stra, strb) {
			if (strb.length < stra.length) 
				return anythingInCommon(strb, stra);

			for (var i = 0, len = stra.length; i < len; i++) {
				if (strb.indexOf(stra[i]) != -1)
					return true;
			}
			return false;
		}

		function getExcludePlayerList (list, exclude) {
			var result = [];
			for (var i = 0; i < list.length; i ++) {
				if (list[i] != exclude) 
					result.push(list[i]);
			}

			return result;
		}

		function getSubPairs(player, flag) {
			var result = [];
			for (var i = 0; i < allPairs.length; i ++) {
				if (flag == 'prefix') {
					if (player == String(allPairs[i]).charAt(0)) {
						result.push(allPairs[i]);
					}
				}
				else if (flag == 'suffix') {
					if (player == String(allPairs[i]).charAt(1)) {
						result.push(allPairs[i]);							
					}						
				}
			}

			return result;
		}

		function onClickCopy() {
			Clipboard.copy($('#code').val());
		}

		function onClickJoin() {
			$('#inputNameModal').modal('show');
		}

		$('#inputNameModal .modal-footer button').on('click', function(event) {
			var button = $(event.target);

			$(this).closest('.modal').on('hidden.bs.modal', function() {
				if (button[0].id == 'nameConfirm') {
					addPlayers();
				}

				$(this).off('hidden.bs.modal');	//avoid accumulated call
			});
		})

		function onClickSwap() {
			if ($('#table-scores tr:last #row-confirm').val() == 'N') {
				$('#warning-message').text('請先確認局數');
				$('#alertModal').modal('show');
				setTimeout(function () {
					$('#alertModal').modal('hide');
				}, 2000);
				return;
			}

			//Swap between e and s, w and n
			resetConsecutiveWin();

			//Confirmed transaction do not swap
			//for (var i = 1; i <= rowNumberTo; i++) {
			for (var i = rowNumberFrom; i <= rowNumberTo; i++) {
				for (var j = 0; j < swapPairs.length; j ++) {
					var fieldScore0 = i + '#' + swapPairs[j][0] + '-score';
					var fieldScoreOriginal0 = i + '#' + swapPairs[j][0] + '-score-original';
					var fieldConfirm0 = i + '#' + swapPairs[j][0] + '-confirm';
					var fieldWin0 = i + '#' + swapPairs[j][0] + '-win';
					var fieldRev0 = i + '#' + swapPairs[j][0] + '-rev';

					var fieldScore1 = i + '#' + swapPairs[j][1] + '-score';
					var fieldScoreOriginal1 = i + '#' + swapPairs[j][1] + '-score-original';
					var fieldConfirm1 = i + '#' + swapPairs[j][1] + '-confirm';
					var fieldWin1 = i + '#' + swapPairs[j][1] + '-win';
					var fieldRev1 = i + '#' + swapPairs[j][1] + '-rev';

					swapStorageValue(fieldScore0, fieldScore1);
					swapStorageValue(fieldScoreOriginal0, fieldScoreOriginal1);
					swapStorageValue(fieldConfirm0, fieldConfirm1);
					swapStorageValue(fieldWin0, fieldWin1);
					swapStorageValue(fieldRev0, fieldRev1);
				}

				var fieldWinnerList = i + '#winner-list';
				var fieldLoserList = i + '#loser-list';
				var winnerListSwap = localStorage.getItem(fieldWinnerList);
				var loserListSwap = localStorage.getItem(fieldLoserList);
				
				for (var k = 0; k < swapPlayers.length; k ++) {

					if (anythingInCommon(winnerListSwap, swapPlayers[k][0]))
						winnerListSwap = winnerListSwap.replace(swapPlayers[k][0], swapPlayers[k][1]);
					if (anythingInCommon(loserListSwap, swapPlayers[k][0]))
						loserListSwap = loserListSwap.replace(swapPlayers[k][0], swapPlayers[k][1]);
				}
				localStorage.setItem(fieldWinnerList, winnerListSwap);
				localStorage.setItem(fieldLoserList, loserListSwap);
			}

			for (var i = 0; i < swapPlayers.length; i ++) {
				swapStorageValue(swapPlayers[i][0] + '-player-input', swapPlayers[i][1] + '-player-input');
				swapStorageValue(swapPlayers[i][0] + '-scores', swapPlayers[i][1] + '-scores');
			}

			//refresh screen 
			$('#table-scores').children('tbody').empty();
			initialize();

			sendServer(true, true);
		}

		function swapStorageValue(from, to) {
			var fromValue = localStorage.getItem(from);
			var toValue = localStorage.getItem(to);

			localStorage.setItem(from, toValue);
			localStorage.setItem(to, fromValue);
		}

		function addPlayers() {
			if ($('#e-player-input').val() == '' || $('#s-player-input').val() == '' || $('#w-player-input').val() == '' || $('#n-player-input').val() == '') {
				$('#warning-message').text('請輸入全部名字');
				$('#alertModal').modal('show');
				setTimeout(function () {
					$('#alertModal').modal('hide');
				}, 2000);
				return;
			}

			if ($('#e-player-input').val() == $('#s-player-input').val() || 
			    $('#e-player-input').val() == $('#w-player-input').val() || 
				$('#e-player-input').val() == $('#n-player-input').val() || 
				$('#s-player-input').val() == $('#w-player-input').val() || 
				$('#s-player-input').val() == $('#n-player-input').val() || 
				$('#w-player-input').val() == $('#n-player-input').val()) 
			{
				$('#warning-message').text('名字不可以相同');
				$('#alertModal').modal('show');
				setTimeout(function () {
					$('#alertModal').modal('hide');
				}, 2000);
				return;
			}

			for (var i = 0; i < allPlayers.length; i ++) {
				$('#' + allPlayers[i] + '-position').text($('#' + allPlayers[i] + '-player-input').val());

				var list = getExcludePlayerList(allPlayers, allPlayers[i]);
				for (var j = 0; j < list.length; j ++) {
					$('#' + list[j] + allPlayers[i] + '-pairs').text($('#' + allPlayers[i] + '-player-input').val());
				}
			}

			//add here to redraw table 
			//$('#table-scores').floatThead();	
			//$('#table-scores').floatThead('reflow');

			$('#top-buttons-1, #bottom-buttons-1, #bottom-buttons-2').find('button').each(function () {
				$(this).attr('disabled', false);
			})
			$('#top-buttons-2').css('visibility', 'visible');

			//reset wind and position and scores only when no save data 
			if (localStorage.getItem('gameDataId') == null) {
				uuid = getUUID();
				localStorage.setItem('gameDataId', uuid);
				
				$('#e-position').addClass('highlightedBlue');
				$('#e-wind').addClass('active');

				localStorage.setItem('currentWind','e-wind');
				localStorage.setItem('currentPosition','e-position');

				localStorage.setItem('rowNumberFrom',1);
				localStorage.setItem('rowNumberTo',0);

				for (var i = 0; i < allPlayers.length; i ++) {
					localStorage.setItem(allPlayers[i] + '-scores',0);
				}

				collectionRooms.doc(uuid).set({ 'uuid': uuid, 
												'currentWind': 'e-wind', 
												'currentPosition': 'e-position', 
												'rowNumberFrom': 1, 
												'rowNumberTo': 0, 
												'e-scores': 0,
												's-scores': 0,
												'w-scores': 0,
												'n-scores': 0,
												'lastUpdateTime': getDateyyyymmddHHmmss()
											}, { merge: true });

				setWindPosition();
			}

			for (var i = 0; i < allPlayers.length; i ++) {
				localStorage.setItem(allPlayers[i] + '-player-input', $('#' + allPlayers[i] + '-player-input').val());
			}

			collectionRooms.doc(uuid).set({ 'e-player-input': $('#e-player-input').val(),
											's-player-input': $('#s-player-input').val(),
											'w-player-input': $('#w-player-input').val(),
											'n-player-input': $('#n-player-input').val(),
											'lastUpdateTime': getDateyyyymmddHHmmss()
										}, { merge: true });
			
			$('#code').val(uuid);

			var selected = $('#player-select').children("option:selected").val();
			if (selected == null) {
				selected = localStorage.getItem('selectedPlayer');
				if (selected == null) selected = '';
			}

			$('#player-select').empty();

			$('#player-select').append($('<option>', {value: (''), text: ('全部')}));
			for (var i = 0; i < allPlayers.length; i ++) {
				$('#player-select').append($('<option>', {value: (allPlayers[i]), text: ($('#' + allPlayers[i] + '-player-input').val())}));
			}

			$('#player-select').val(selected);
			startSnapShotTransaction(selected);
		}

		function startSnapShotTransaction (selectedPlayer) {
			//stop previous monitor
			if (snapShotTransaction != null) snapShotTransaction();

			localStorage.setItem('selectedPlayer', selectedPlayer);

			$('#table-confirm-transaction-main').hide();
			//retrieve all if set blank by default 
			if (selectedPlayer != '') {
				//filter by player name
				snapShotTransaction = collectionTransactions
					.where('uuid', '==', uuid).where('players', 'array-contains', $('#' + selectedPlayer + '-player-input').val()).orderBy('timestamp')
					.onSnapshot(function(querySnapshot) {
						$('#table-confirm-transaction-main > tbody:last-child').empty();
						querySnapshot.forEach(function(doc) {
							var transactionUuid = doc.data().transactionUuid;
							if ($('#' + transactionUuid).length == 0)
								$('#table-confirm-transaction-main > tbody:last-child').prepend('<tr><td class="align-center" style="font-size: large; vertical-align: middle; color: DarkGray;">' + 
									formatDateddMMHHmm(doc.data().timestamp) + '</td><td><text id="' + transactionUuid + '" class="align-left ' + (doc.data().marked ? 'strike' : '') + 
									'" onclick="onTransactionClick(this,' + doc.data().marked + ');" style="color:' + (doc.data().pay == $('#' + selectedPlayer + '-player-input').val() ? 'red' : 'blue') + ';">' + doc.data().detail + '</text></td></tr>');
						})
						$('#table-confirm-transaction-main').show();
					});
			}
			else {
				snapShotTransaction = collectionTransactions
					.where('uuid', '==', uuid).orderBy('timestamp')
					.onSnapshot(function(querySnapshot) {
						$('#table-confirm-transaction-main > tbody:last-child').empty();
						querySnapshot.forEach(function(doc) {
							var transactionUuid = doc.data().transactionUuid;
							if ($('#' + transactionUuid).length == 0)
								$('#table-confirm-transaction-main > tbody:last-child').prepend('<tr><td class="align-center" style="font-size: large; vertical-align: middle; color: DarkGray;">' + 
									formatDateddMMHHmm(doc.data().timestamp) + '</td><td><text id="' + transactionUuid + '" class="align-left ' + (doc.data().marked ? 'strike' : '') + 
									'" onclick="onTransactionClick(this,' + doc.data().marked + ');">' + doc.data().detail + '</text></td></tr>');
						})
						$('#table-confirm-transaction-main').show();
					});
			}
		}

		function onTransactionClick(element, marked) {
			collectionTransactions.doc(element.id).set ({marked: (marked ? false : true)}, { merge: true });
			if (marked) $(element).removeClass('strike');
			else $(element).addClass('strike');
		}
		
		$('#player-select').change(function () {
			var selected = $('#player-select').children("option:selected").val();
			if (selected == null) selected = '';
			startSnapShotTransaction(selected);
		});

		$('#checkbox-calc').on('click', function(){
			localStorage.setItem('checkbox-calc', $('#checkbox-calc').is(':checked'));
		})

		$('#table-scores-thead tr[id=header-row-2]').find('th').click(function () {
			resetConsecutiveWin();

			for (var i = 0; i < allPlayers.length; i ++) {
				$('#' + allPlayers[i] + '-position').removeClass('highlightedBlue');
			}

			$(this).addClass('highlightedBlue');

			localStorage.setItem('currentPosition', this.id);
			collectionRooms.doc(uuid).set({'currentPosition': this.id, 'lastUpdateTime': getDateyyyymmddHHmmss()}, { merge: true });

		function gameTimeout() {
			setTimeout(() => {					
				var mode = '';
				$('#input-game-body').find('label[name=mode]').each(function(){
					if ($(this).hasClass('active')) {
						mode = this.id;
						if (mode == 'self' || mode == 'eat')
							$('#game-note').text('在負方輸入番數');
						else if (mode == 'multi')
							$('#game-note').text('在勝方輸入番數');
					}
				});

				var winCount = 0, loseCount = 0;
				$('#input-game-body').find('label[name=win]').each(function(){
					if ($(this).hasClass('active')) {
						winCount ++;
					}
				});

				$('#input-game-body').find('label[name=lose]').each(function(){
					if ($(this).hasClass('active')) {
						if (this.id == 'e-lose' && parseInt($('#e-point').val()) > 0)
							loseCount ++;
						if (this.id == 's-lose' && parseInt($('#s-point').val()) > 0)
							loseCount ++;
						if (this.id == 'w-lose' && parseInt($('#w-point').val()) > 0)
							loseCount ++;
						if (this.id == 'n-lose' && parseInt($('#n-point').val()) > 0)
							loseCount ++;
					}
				});

				if (mode == 'self') {
					var winPosition = '';
					$('#input-game-body').find('label[name=win]').each(function(){
						if ($(this).hasClass('active')) {
							winPosition = $(this).attr('id').charAt(0);
						}
					});
					var curPosition = localStorage.getItem('currentPosition').charAt(0);
					var list = getExcludePlayerList(allPlayers, winPosition);

					//if current position win self, all lose values must be the same
					if (winPosition == curPosition) {
						var losePoint1 = parseInt($('#' + list[0] + '-point').val()) || 0;
						var losePoint2 = parseInt($('#' + list[1] + '-point').val()) || 0;
						var losePoint3 = parseInt($('#' + list[2] + '-point').val()) || 0;

						if (losePoint1 > 0 && losePoint2 > 0 && losePoint3 > 0 && 
							losePoint1 == losePoint2 && losePoint2 == losePoint3 && 
							winCount == 1 && loseCount == 3) 
						{
							$('#gameConfirm').prop('disabled', false);
							return;
						}
					}
					//if not current position win self, current position point must be more than others 
					else
					{
						var currentPositionLosePoint = parseInt($('#' + curPosition + '-point').val()) || 0;
						var list = getExcludePlayerList(list, curPosition);
						var losePoint1 = parseInt($('#' + list[0] + '-point').val()) || 0;
						var losePoint2 = parseInt($('#' + list[1] + '-point').val()) || 0;
					
						if (losePoint1 > 0 && losePoint2 > 0 && currentPositionLosePoint > 0 && 
							losePoint1 == losePoint2 && currentPositionLosePoint > losePoint1 && 
							winCount == 1 && loseCount == 3) 
						{
							$('#gameConfirm').prop('disabled', false);
							return;
						}
					}
				}
				else if (mode == 'eat') {
					if (winCount == 1 && loseCount == 1) {
						$('#gameConfirm').prop('disabled', false);
						return;
					}
				}
				else if (mode == 'multi') {
					//Reverse count
					winCount = 0, loseCount = 0;
					$('#input-game-body').find('label[name=win]').each(function(){
						if ($(this).hasClass('active')) {
							if (this.id == 'e-win' && parseInt($('#e-point').val()) > 0)
								winCount ++;
							if (this.id == 's-win' && parseInt($('#s-point').val()) > 0)
								winCount ++;
							if (this.id == 'w-win' && parseInt($('#w-point').val()) > 0)
								winCount ++;
							if (this.id == 'n-win' && parseInt($('#n-point').val()) > 0)
								winCount ++;
						}
					});
					$('#input-game-body').find('label[name=lose]').each(function(){
						if ($(this).hasClass('active')) {
							loseCount ++;
						}
					});

					if ((winCount == 2 || winCount == 3) && loseCount == 1) {
						$('#gameConfirm').prop('disabled', false);
						return;
					}
				}

				$('#gameConfirm').prop('disabled', true);
			}, 150);
		}

		function onScoreChange(row, id, value) {
			//retrieve before value from opposite column 
			var oppositeColumn = id.charAt(1) + id.charAt(0);
			var beforeValue = '';
			if ($('#table-scores #' + row + ' #' + oppositeColumn + '-score').val() != '') 
				beforeValue = $('#table-scores #' + row + ' #' + oppositeColumn + '-score').val() * -1;

			if (value < 0) {
				$('#table-scores #' + row + ' #' + id).val(beforeValue);
				$('#warning-message').text('請輸入正數番數');
				$('#alertModal').modal('show');
				setTimeout(function () {
					$('#alertModal').modal('hide');
				}, 2000);
				return;
			}

			if ($('#table-scores #' + row + ' #row-confirm').val() == 'Y' && (value == '' || value == '0')) {
				$('#table-scores #' + row + ' #' + id).val(beforeValue);
				$('#warning-message').text('已確認局數不可輸入 0 或留空');
				$('#alertModal').modal('show');
				setTimeout(function () {
					$('#alertModal').modal('hide');
				}, 2000);
				return;
			}

			//update opposite column with negative value or reset value
			if (value == '') 
				$('#table-scores #' + row + ' #' + oppositeColumn + '-score').val('');
			else 
				$('#table-scores #' + row + ' #' + oppositeColumn + '-score').val(value * -1);

			saveRow(row, id.slice(0,2), true);
			saveRow(row, oppositeColumn, true);
		}

		async function getSumPoints() {
			//reset all to zero 
			gameResultDetails.fill(0);

			const snapshot = await collectionTransactions.where('uuid', '==', uuid).get();
			snapshot.forEach(doc => {
				var data = doc.data();

				for (var i = 0; i < halfPairs.length; i ++) {
					var player = $('#' + String(halfPairs[i]).charAt(0) + '-player-input').val();
					var counterPlayer = $('#' + String(halfPairs[i]).charAt(1) + '-player-input').val();

					sum(data, player, counterPlayer, "食糊", i);
					sum(data, player, counterPlayer, "賞罰", i);
					sum(data, player, counterPlayer, "調整", i);
				}
			});

			for (var i = 0; i < halfPairs.length; i ++) {
				//point
				$('#' + String(halfPairs[i]).charAt(0) + String(halfPairs[i]).charAt(1) + '-point').text(gameResultDetails[i * elementsPerRow] - gameResultDetails[i * elementsPerRow + 1]);
				$('#' + String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0) + '-point').text(gameResultDetails[i * elementsPerRow + 1] - gameResultDetails[i * elementsPerRow]);
				//punish
				$('#' + String(halfPairs[i]).charAt(0) + String(halfPairs[i]).charAt(1) + '-punish').text(gameResultDetails[i * elementsPerRow + 2]);
				$('#' + String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0) + '-reward').text(gameResultDetails[i * elementsPerRow + 2] * -1);
				//reward
				$('#' + String(halfPairs[i]).charAt(0) + String(halfPairs[i]).charAt(1) + '-reward').text(gameResultDetails[i * elementsPerRow + 3]);
				$('#' + String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0) + '-punish').text(gameResultDetails[i * elementsPerRow + 3] * -1);
				//adjust
				$('#' + String(halfPairs[i]).charAt(0) + String(halfPairs[i]).charAt(1) + '-adjust').text(gameResultDetails[i * elementsPerRow + 4] - gameResultDetails[i * elementsPerRow + 5]);
				$('#' + String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0) + '-adjust').text(gameResultDetails[i * elementsPerRow + 5] - gameResultDetails[i * elementsPerRow + 4]);
			}

			const prefixes = ['e', 's', 'w', 'n'];
			for (const p of prefixes) {
				sumTotal(p, 'point');
				sumTotal(p, 'reward');
				sumTotal(p, 'punish');
				sumTotal(p, 'adjust');
			}
		}

		function sum(data, pay, receive, type, i) {
			var j = 0;
			if (type == "賞罰") j = 2;
			else if (type == "調整") j = 4;

			if (data.pay == pay && data.receive == receive && data.type == type) {
				var pos = elementsPerRow * i + j;
				gameResultDetails[pos] -= Number(data.point || 0);
				console.log(pos + ' ' + data.point + ' ' + gameResultDetails[pos]);
			}
			else if (data.pay == receive && data.receive == pay && data.type == type) {
				var pos = elementsPerRow * i + j + 1;
				if (type == "賞罰")		//different handling as it shows breakdown 
					gameResultDetails[pos] += Number(data.point || 0);
				else 
					gameResultDetails[pos] -= Number(data.point || 0);
				console.log(pos + ' ' + data.point + ' ' + gameResultDetails[pos]);
			}
		}

		function sumTotal(prefix, suffix) {
			const columns = ['e', 's', 'w', 'n'].filter(x => x !== prefix);

			let total = 0;
			columns.forEach(col => {
				total += Number($('#' + prefix + col + '-' + suffix).text() || 0);
			});
			$('#' + prefix + '-' + suffix + '-total').text(total);
		}

		function generatePlayerStatisticsTable(prefix) {

			const columns = ['e', 's', 'w', 'n'].filter(x => x !== prefix);

			const rows = [
				{ label: '食糊', suffix: 'point', color: 'black' },
				{ label: '賞', suffix: 'reward', color: '#3399FF' },
				{ label: '罰', suffix: 'punish', color: 'red' },
				{ label: '調整', suffix: 'adjust', color: 'black' }
			];

			let html = '';

			// TABLE START + THEAD
			html += `
				<table class="table table-bordered table-secondary col-12 align-center"
					id="table-${prefix}-statistics"
					cellspacing="0"
					cellpadding="0"
					style="border-collapse: collapse;table-layout: fixed;">

					<thead id="table-${prefix}-scores-thead"
						style="background-color:#3399FF;color:white;">

						<tr class="display-5">
			`;

			html += `
					<th position="${prefix}-position"
						style="padding:5px;width:20%;">
					</th>
				`;

			// dynamic column headers
			columns.forEach(col => {
				html += `
					<th position="${col}-position"
						style="padding:5px;width:20%;">
					</th>
				`;
			});

			// total column
			html += `
					<th style="padding:5px;width:20%;">合計</th>
				</tr>
			</thead>

			<tbody>
			`;

			// ROWS
			rows.forEach(row => {

				html += `
					<tr class="display-5">
						<th style="padding:5px;background-color:white;color:${row.color};width:20%;">
							${row.label}
						</th>
				`;

				columns.forEach(col => {
					html += `
						<th id="${prefix}${col}-${row.suffix}"
							style="padding:5px;background-color:white;color:${row.color};width:20%;">
						</th>
					`;
				});

				html += `
						<th id="${prefix}-${row.suffix}-total"
							style="padding:5px;background-color:white;color:${row.color};width:20%;">
						</th>
					</tr>
				`;
			});

			html += `
					</tbody>
				</table>
				</br>
			`;

			return html;
		}

						winnerName += $('#' + firstChar + '-player-input').val() + '\r\n';
					};

					//Construct loser list
					var secondChar = this.id.charAt(1);
					if (loserList.search(secondChar) == -1) {
						loserList += secondChar;
					};
					if (loserName.search($('#' + secondChar + '-player-input').val()) == -1) {
						loserName += $('#' + secondChar + '-player-input').val() + '\r\n';
					};
				};
			});

			if (winnerList == '' || loserList == '') {
				$('#warning-message').text('請輸入正數番數');
				$('#alertModal').modal('show');
				setTimeout(function () {
					$('#alertModal').modal('hide');
				}, 2000);
				return;
			};

			if (anythingInCommon(winnerList, loserList)) {
				$('#warning-message').text('輸入錯誤,有玩家在勝方跟負方內同時出現');
				$('#alertModal').modal('show');
				setTimeout(function () {
					$('#alertModal').modal('hide');
				}, 2000);
				return;
			};

			if ($('#table-scores #' + rowNumberTo + ' #mode').val() == 'reward' || $('#table-scores #' + rowNumberTo + ' #mode').val() == 'punish') {
				$('#confirm-winner-label').text('賞');
				$('#confirm-loser-label').text('罰');
			}
			else if ($('#table-scores #' + rowNumberTo + ' #mode').val() == 'adjust') {
				$('#confirm-winner-label').text('正');
				$('#confirm-loser-label').text('負');
			}
			else {
				$('#confirm-winner-label').text('勝');
				$('#confirm-loser-label').text('負');
			};
			$('#confirm-winner-name').text(winnerName);
			$('#confirm-loser-name').text(loserName);

			$('#confirmModal').modal('show');
		}

		$('#confirmModal .modal-footer button').on('click', function(event) {
			var button = $(event.target);

			$(this).closest('.modal').on('hidden.bs.modal', function() {
				if (button[0].id == 'confirm') {
					processConfirm();

					sendServer(true, true);
				};

				$(this).off('hidden.bs.modal');	//avoid accumulated call
			});
		})

		function processConfirm () {
			$('#table-scores #' + rowNumberTo + ' #winner-list').val(winnerList);
			$('#table-scores #' + rowNumberTo + ' #loser-list').val(loserList);

			//clear previous result
			$('#table-confirm-transaction').empty();

			//if reward / punish / adjust, just mark complete of current row, update total score
			if ($('#table-scores #' + rowNumberTo + ' #mode').val() == 'reward' || 
				$('#table-scores #' + rowNumberTo + ' #mode').val() == 'punish' || 
			    $('#table-scores #' + rowNumberTo + ' #mode').val() == 'adjust') {
				$('#table-scores #' + rowNumberTo).find('input[type=number]').each(function(){
					if (parseInt($(this).val()) > 0) adjustScore(rowNumberTo, $(this).attr('id').slice(0,2), parseInt($(this).val()));
				});

				$('#table-scores #' + rowNumberTo).remove();
				rowNumberTo--;
				//document.getElementById('bottom-buttons').scrollIntoView();	//scroll to bottom
				$(this).off('hidden.bs.modal');	//avoid accumulated call
				return;
			}
			else {
				//handle in different sequence for revenge case check
				for (var i = 0; i < halfPairs.length; i ++) {
					if (parseInt($('#table-scores #' + rowNumberTo + ' #' + halfPairs[i] + '-score').val()) > 0) {
						process (rowNumberTo, halfPairs[i]);
						process (rowNumberTo, String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0));
					}
					else {
						process (rowNumberTo, String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0));
						process (rowNumberTo, halfPairs[i]);
					};
				}

				if ($('#table-confirm-transaction tr').length > 0) {
					$('#confirmTransactionModal').modal('show');
					setTimeout(function () {
						$('#confirmTransactionModal').modal('hide');
					}, 2000);
				}
			};

			protectLastRow();

			$('#table-scores #' + rowNumberTo + ' #row-confirm').val('Y');

			markWinnerLoser();

			//save row after confirm
			localStorage.setItem('rowNumberTo', rowNumberTo);

			localStorage.setItem(rowNumberTo + '#mode', $('#table-scores #' + rowNumberTo + ' #mode').val());
			localStorage.setItem(rowNumberTo + '#winner-list', $('#table-scores #' + rowNumberTo + ' #winner-list').val());
			localStorage.setItem(rowNumberTo + '#loser-list', $('#table-scores #' + rowNumberTo + ' #loser-list').val());

			for (var i = 0; i < allPairs.length; i ++) {
				saveRow (rowNumberTo, allPairs[i], false);
			}

			updateConsecutiveWin();

			//change wind and position if necessary
			changeWindPosition();

			//document.getElementById('bottom-buttons').scrollIntoView();	//scroll to bottom
		}

		function saveRow (r, c, upload) {
			localStorage.setItem(r + '#' + c + '-score', $('#table-scores #' + r + ' #' + c + '-score').val());
			localStorage.setItem(r + '#' + c + '-score-original', $('#table-scores #' + r + ' #' + c + '-score-original').val());
			localStorage.setItem(r + '#' + c + '-confirm', $('#table-scores #' + r + ' #' + c + '-confirm').val());
			localStorage.setItem(r + '#' + c + '-win', $('#table-scores #' + r + ' #' + c + '-win').val());
			localStorage.setItem(r + '#' + c + '-rev', $('#table-scores #' + r + ' #' + c + '-rev').val());

			if (upload) {
				var fieldScore = c + '-score';
				var fieldScoreOriginal = c + '-score-original';
				var fieldConfirm = c + '-confirm';
				var fieldWin = c + '-win';
				var fieldRev = c + '-rev';

				collectionRecords.where("uuid", "==", uuid).where("row", "==", r).get().then(function(querySnapshot) {
					querySnapshot.forEach(function(doc) {
						// doc.data() is never undefined for query doc snapshots
						console.log(doc.id);
						collectionRecords.doc(doc.id).set({[fieldScore]: $('#table-scores #' + r + ' #' + c + '-score').val(),
															[fieldScoreOriginal]: $('#table-scores #' + r + ' #' + c + '-score-original').val(),
															[fieldConfirm]: $('#table-scores #' + r + ' #' + c + '-confirm').val(),
															[fieldWin]: $('#table-scores #' + r + ' #' + c + '-win').val(),
															[fieldRev]: $('#table-scores #' + r + ' #' + c + '-rev').val(),
															'lastUpdateTime': getDateyyyymmddHHmmss()
															}, { merge: true });
					});
				})
				.catch(function(error) {
					console.log("Error getting records: ", error);
				});
			}
		}

				else if (curPosition == 'n') {
					$('#e-position').trigger('click');

					else if (curWind == 'n') $('#e-wind').trigger('click');
				}
			}

			$('#header-row-3 th').each(function () {
				$(this).css('color','white');
			});

			for (var i = 0; i < halfPairs.length; i ++) {

		function searchWinnerLoser (c) {
			var oppositec = c.charAt(1) + c.charAt(0);

			for (var r = rowNumberTo; r >= rowNumberFrom; r--) {
				//If confirmed, exit
				if ($('#table-scores #' + r + ' #' + c + '-confirm').val() == 'Y') break;
				
				var score = $('#table-scores #' + r + ' #' + c + '-score').val() == '' ? 0 : parseInt($('#table-scores #' + r + ' #' + c + '-score').val());

				if (score > 0) {
					$('#' + c + '-pairs').css('color','#0d6786');
					$('#' + oppositec + '-pairs').css('color','red');
					break;
				}

				if ($('#table-scores #' + r + ' #' + oppositec + '-confirm').val() == 'Y') break;
				
				var oppositeScore = $('#table-scores #' + r + ' #' + oppositec + '-score').val() == '' ? 0 : parseInt($('#table-scores #' + r + ' #' + oppositec + '-score').val());

				if (oppositeScore > 0) {
					$('#' + oppositec + '-pairs').css('color','#0d6786');
					$('#' + c + '-pairs').css('color','red');
					break;
				}
			}
		}

		function updateConsecutiveWin() {

					$('#' + allPlayers[i] + '-consecutive-win').val(0);
					$('#' + allPlayers[i] + '-consecutive-win-label').text('');

				else {
					var curWinner = localStorage.getItem(rowNumberTo + '#winner-list');

					if (anythingInCommon(curWinner, allPlayers[i]) && allPlayers[i] == localStorage.getItem('currentPosition').charAt(0)) {
						var value = parseInt($('#' + allPlayers[i] + '-consecutive-win').val()); 
						value ++; 
						$('#' + allPlayers[i] + '-consecutive-win').val(value);
						$('#' + allPlayers[i] + '-consecutive-win-label').text('連 ' + value);
					}
					else {
						$('#' + allPlayers[i] + '-consecutive-win').val(0);
						$('#' + allPlayers[i] + '-consecutive-win-label').text('');
					}
				}

				localStorage.setItem(allPlayers[i] + '-consecutive-win', $('#' + allPlayers[i] + '-consecutive-win').val());
			}
		}

		function deleteAllColumnsProtectRows () {

			var rowId = $('#table-scores').find('tbody tr:first').attr('id');

			if (rowId == null) return;

			while (checkAllColumnsProtect(rowId)) {
				$('#table-scores #' + rowId).remove();

			rowNumberFrom = parseInt(rowId);
			localStorage.setItem('rowNumberFrom', rowNumberFrom);

				if ($(this).attr('readonly') != 'readonly') result = false;
			});

		function adjustScore (r, c, s) {

			$('#' + c.charAt(1) + '-scores').text(parseInt($('#' + c.charAt(1) + '-scores').text()) + s * -1);

		function adjustScoreDirect (p, s) {

		function process (curRow, column) {
			var curScore = $('#table-scores #' + curRow + ' #' + column + '-score').val() == '' ? 0 : parseInt($('#table-scores #' + curRow + ' #' + column + '-score').val());
			$('#table-scores #' + curRow + ' #' + column + '-score-original').val(curScore);

			if (curRow > 1) {
				//Revenge 
				if (curScore > 0) {
					//Search unsettled transactions in opposite column
					var oppositeColumn = column.charAt(1) + column.charAt(0);

					for (var oppositeRows = curRow - 1; oppositeRows >= rowNumberFrom; oppositeRows--) {
						//If confirmed, exit
						if ($('#table-scores #' + oppositeRows + ' #' + oppositeColumn + '-confirm').val() == 'Y') break;

						var prevOppositeScore = $('#table-scores #' + oppositeRows + ' #' + oppositeColumn + '-score').val() == '' ? 0 : parseInt($('#table-scores #' + oppositeRows + ' #' + oppositeColumn + '-score').val());

						if (prevOppositeScore > 0) {
							prevOppositeScore = Math.floor(prevOppositeScore / 2);

							$('#table-scores #' + oppositeRows + ' #' + oppositeColumn + '-score').val(prevOppositeScore);
							$('#table-scores #' + oppositeRows + ' #' + oppositeColumn + '-score').css('color','red');
							$('#table-scores #' + oppositeRows + ' #' + oppositeColumn + '-rev').val('Y');

							localStorage.setItem(oppositeRows + '#' + oppositeColumn + '-score', $('#table-scores #' + oppositeRows + ' #' + oppositeColumn + '-score').val());
							localStorage.setItem(oppositeRows + '#' + oppositeColumn + '-rev', $('#table-scores #' + oppositeRows + ' #' + oppositeColumn + '-rev').val());

							$('#table-scores #' + oppositeRows + ' #' + column + '-score').val(prevOppositeScore * -1);
							$('#table-scores #' + oppositeRows + ' #' + column + '-score').css('color','red');
							$('#table-scores #' + oppositeRows + ' #' + column + '-rev').val('Y');

							localStorage.setItem(oppositeRows + '#' + column + '-score', $('#table-scores #' + oppositeRows + ' #' + column + '-score').val());
							localStorage.setItem(oppositeRows + '#' + column + '-rev', $('#table-scores #' + oppositeRows + ' #' + column + '-rev').val());

							markConfirm (oppositeRows, oppositeColumn, prevOppositeScore);

							break;
						}
					}
				}

				var prevWinner = column.charAt(0);
				var curWinnerList = $('#table-scores #' + curRow + ' #winner-list').val();

				for (var rows = curRow - 1; rows >= rowNumberFrom; rows--) {
					//If confirmed, exit
					if ($('#table-scores #' + rows + ' #' + column + '-confirm').val() == 'Y') break;

					var prevScore = $('#table-scores #' + rows + ' #' + column + '-score').val() == '' ? 0 : parseInt($('#table-scores #' + rows + ' #' + column + '-score').val());

					if (curScore == 0 && prevScore > 0) {
						// if winner is the same, keep the score 
						if (anythingInCommon(curWinnerList, prevWinner)) {
						}
						//Mark confirmed
						else {
							markConfirm (rows, column, prevScore);
						}

						break;
					};

					//Topup
					if (curScore > 0 && prevScore > 0) {
						var oppositeColumn = column.charAt(1) + column.charAt(0);

						prevScore += Math.ceil(prevScore / 2);
						curScore += prevScore;

						//Set previous score to zero 
						$('#table-scores #' + rows + ' #' + column + '-score').val(0);
						$('#table-scores #' + rows + ' #' + column + '-score').css('color','blue');

						localStorage.setItem(rows + '#' + column + '-score', $('#table-scores #' + rows + ' #' + column + '-score').val());

						markConfirm (rows, column, 0);

						$('#table-scores #' + rows + ' #' + oppositeColumn + '-score').val(0);
						$('#table-scores #' + rows + ' #' + oppositeColumn + '-score').css('color','blue');

						localStorage.setItem(rows + '#' + oppositeColumn + '-score', $('#table-scores #' + rows + ' #' + oppositeColumn + '-score').val());

						markConfirm (rows, oppositeColumn, 0);

						$('#table-scores #' + curRow + ' #' + column + '-score').val(curScore);
						$('#table-scores #' + curRow + ' #' + column + '-score').css('color','blue');

						localStorage.setItem(curRow + '#' + column + '-score', $('#table-scores #' + curRow + ' #' + column + '-score').val());

						$('#table-scores #' + curRow + ' #' + oppositeColumn + '-score').val(curScore * -1);
						$('#table-scores #' + curRow + ' #' + oppositeColumn + '-score').css('color','blue');

						localStorage.setItem(curRow + '#' + oppositeColumn + '-score', $('#table-scores #' + curRow + ' #' + oppositeColumn + '-score').val());

						var win = parseInt($('#table-scores #' + rows + ' #' + column + '-win').val()) + 1;
						$('#table-scores #' + curRow + ' #' + column + '-win').val(win);

						localStorage.setItem(curRow + '#' + column + '-win', $('#table-scores #' + curRow + ' #' + column + '-win').val());

						$('#table-scores #' + curRow + ' #' + oppositeColumn + '-win').val(win);

						localStorage.setItem(curRow + '#' + oppositeColumn + '-win', $('#table-scores #' + curRow + ' #' + oppositeColumn + '-win').val());

						//Surrender in multiple of 3
						if (win % 3 == 0) {
							//More than one modal may prompt, use jquery-confirm instead of bootstrap modal
							$.confirm({
								title: '',
								theme: 'bootstrap',
								content: ($('#' + column.charAt(1) + '-player-input').val()) + ' 投降給 ' + ($('#' + column.charAt(0) + '-player-input').val()) + ' (' + ($('#' + column.charAt(1) + '-player-input').val()) + ' 付 ' + Math.abs(curScore) + ' 給 ' + ($('#' + column.charAt(0) + '-player-input').val()) + ') ?',
								columnClass: 'display-5 col-12',
								animation: 'top',
								closeAnimation: 'top',
								animateFromElement: false,
								buttons: {
									yes: {
										text: '是',
										btnClass: 'btn-blue',
										action: function () {
											markConfirm (curRow, column, curScore);
											markConfirm (curRow, oppositeColumn, curScore * -1);

											markWinnerLoser();

											sendServer(true, true);
										}
									},
									no: {
										text: '否',
										btnClass: 'btn-red',
									}
								}
							});
						};

						break;
					};
				};
			};
		}

		function sendServer (isUpdateHeader, isUpdateDetail) {
			collectionRooms.doc(uuid).get().then(function(doc) {
				if (doc.exists) {
					if (isUpdateHeader) updateHeader();
					if (isUpdateDetail) updateDetail();
				}
			});
		}

		function updateHeader () {
			collectionRooms.doc(uuid).set({'e-scores': $('#e-scores').text(),
											's-scores': $('#s-scores').text(),
											'w-scores': $('#w-scores').text(),
											'n-scores': $('#n-scores').text(),
											'e-consecutive-win': $('#e-consecutive-win').val(),
											's-consecutive-win': $('#s-consecutive-win').val(),
											'w-consecutive-win': $('#w-consecutive-win').val(),
											'n-consecutive-win': $('#n-consecutive-win').val(),
											'currentWind': localStorage.getItem('currentWind'),
											'currentPosition': localStorage.getItem('currentPosition'),
											'rowNumberFrom': rowNumberFrom,
											'rowNumberTo': rowNumberTo,
											//'confirmTransaction': $('#table-confirm-transaction-main').html(),											
											'lastUpdateTime': getDateyyyymmddHHmmss()
											}, { merge: true });
		}

		function updateDetail () {
			//delete all rows
			collectionRecords.where("uuid", "==", uuid).get().then(function(querySnapshot) {
				querySnapshot.forEach(function(doc) {
					// doc.data() is never undefined for query doc snapshots
					console.log(doc.id);
					collectionRecords.doc(doc.id).delete().then(function() {
						console.log('records successfully deleted!');
					}).catch(function(error) {
						console.error('Error removing records: ', error);
					});	
				});
				addDetail();	//add rows after 
			})
			.catch(function(error) {
				console.log("Error getting records: ", error);
			});
		}

		function addDetail () {
			for (var i = rowNumberFrom; i <= rowNumberTo; i++)
			{
				var recordUuid = getUUID();

				collectionRecords.doc(recordUuid).set({"recordUuid": recordUuid,
														"uuid": uuid,
														"row": i,
														"mode": $('#table-scores #' + i + ' #mode').val(),
														"winner-list": $('#table-scores #' + i + ' #winner-list').val(),
														"loser-list": $('#table-scores #' + i + ' #loser-list').val(),
														'lastUpdateTime': getDateyyyymmddHHmmss()
														}, { merge: true });

				for (var j = 0; j < allPairs.length; j++) { 
					var fieldRecordScore = allPairs[j] + '-score';
					var fieldRecordScoreOriginal = allPairs[j] + '-score-original';
					var fieldRecordConfirm = allPairs[j] + '-confirm';
					var fieldRecordWin = allPairs[j] + '-win';
					var fieldRecordRev = allPairs[j] + '-rev';

					collectionRecords.doc(recordUuid).set({[fieldRecordScore]: $('#table-scores #' + i + ' #' + allPairs[j] + '-score').val(),
															[fieldRecordScoreOriginal]: $('#table-scores #' + i + ' #' + allPairs[j] + '-score-original').val(),
															[fieldRecordConfirm]: $('#table-scores #' + i + ' #' + allPairs[j] + '-confirm').val(),
															[fieldRecordWin]: $('#table-scores #' + i + ' #' + allPairs[j] + '-win').val(),
															[fieldRecordRev]: $('#table-scores #' + i + ' #' + allPairs[j] + '-rev').val(),
															'lastUpdateTime': getDateyyyymmddHHmmss()
															}, { merge: true });
				}
			}
		}

		function sendServerTransaction (pay, receive, point, type, detail) {
			var transactionUuid = getUUID();

			var data = {
				uuid: uuid,
				transactionUuid: transactionUuid,
				pay: pay,
				receive: receive,
				players: [pay, receive],
				point: point,
				detail: detail,
				type: type,
				marked: false,
				timestamp: getDateyyyymmddHHmmss()
			};

			collectionTransactions.doc(transactionUuid).set(data)
			.then(() => {
				console.log("Row added:", data);
			})
			.catch((err) => {
				console.error("Error:", err);
			});	
		}	
  </script>
</body>
</html>
