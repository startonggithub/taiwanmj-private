						<th colspan="3" style="padding:5px;background-color:white;color:#3399FF;width:25%;"><text id="w-scores">0</text>&nbsp;<span id="w-consecutive-win-label" class="badge badge-pill badge-primary"></span><input type="hidden" id="w-consecutive-win" value="0"></th>
						<th colspan="3" style="padding:5px;background-color:white;color:#3399FF;width:25%;"><text id="n-scores">0</text>&nbsp;<span id="n-consecutive-win-label" class="badge badge-pill badge-primary"></span><input type="hidden" id="n-consecutive-win" value="0"></th>

						<th colspan="3" id="s-position" style="padding:5px;width:25%;"></th>

					</tr>
					<tr id="header-row-3" >
						<th id="es-pairs" style="padding:5px;width:8%;"></th>

						<th id="en-pairs" style="padding:5px;width:8%;"></th>
						<th id="se-pairs" style="padding:5px;width:8%;"></th>
						<th id="sw-pairs" style="padding:5px;width:8%;"></th>
						<th id="sn-pairs" style="padding:5px;width:8%;"></th>

	<script src="assets/web/assets/jquery/jquery.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/6.3.3/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/6.3.3/firebase-firestore.js"></script>
    <script src="assets/web/assets/common.js"></script>
	<script src="assets/web/assets/environment.js"></script>

	<script type="text/javascript">
		var basic = {
			currentPosition : '',
			currentWind : '',
			e_player_input : '',
			s_player_input : '',
			w_player_input : '',
			n_player_input : '',
			e_scores : 0,
			s_scores : 0,
			w_scores : 0,
			n_scores : 0,
			e_consecutive_win : 0,
			s_consecutive_win : 0,
			w_consecutive_win : 0,
			n_consecutive_win : 0,
			rowNumberFrom : 1,
			rowNumberTo : 0,
			//confirmTransaction : '',
			lastUpdateTime : ''
		}

		var row = {
			mode : '',
			winner_list : '',
			loser_list : ''
		}

		var cell = {
			score : 0,
			score_original : 0,
			confirm : '',
			win : '',
			rev : ''
		}

		var snapShot;
		var snapShotRecord;
		var snapShotTransaction;

		$(document).ready(function () {
			resize();
			window.addEventListener('resize', resize);

			var param = getUrlParam('shareGameDataId', '');
			if (param != '') {
			    localStorage.setItem('shareGameDataId', param);
			}

			if (localStorage.getItem('shareGameDataId') != null && localStorage.getItem('shareGameDataId') != '') {
				$('#code').val(localStorage.getItem('shareGameDataId'));
				onClickRetrieve();
			}
		})

		function onClickRetrieve () {
			if ($('#code').val() != null && $('#code').val() != '') {
				var selectedPlayer = $('#player').children("option:selected").val();
				if (selectedPlayer == null) {
					selectedPlayer = localStorage.getItem('shareSelectedPlayer');
					if (selectedPlayer == null) selectedPlayer = '';
				}

				startSnapShot($('#code').val());
				startSnapShotRecord($('#code').val());
				startSnapShotTransaction($('#code').val(), selectedPlayer);
			}
		}

		function startSnapShot (uuid) {
			//stop previous monitor
			if (snapShot != null) snapShot();

			snapShot = collectionRooms
				.doc(uuid)
				.onSnapshot({includeMetadataChanges: false}, function(doc) {
					reset();
					if (doc.exists) {
						updateBasic(doc);

						$('#top-menu').find('button').each(function () {
							$(this).attr('disabled', false);
						})
					}
					else {
						localStorage.removeItem('shareGameDataId');
						localStorage.removeItem('shareSelectedPlayer');
						$('#warning-message').text('識別碼不正確 / 局數已結束');
						$('#alertModal').modal('show');
						setTimeout(function () {
							$('#alertModal').modal('hide');
						}, 2000);
						$('#table-confirm-transaction-main > tbody:last-child').empty();
						return;
					}
				}, function(error) {
					console.log('Error get rooms document:', error);
				});
		}

		function startSnapShotRecord (uuid) {
			//stop previous monitor
			if (snapShotRecord != null) snapShotRecord();

			snapShotRecord = collectionRecords
				.where('uuid', '==', uuid).orderBy('row')
				.onSnapshot(function(querySnapshot) {
					$('#table-scores').children('tbody').empty();
					querySnapshot.forEach(function(doc) {
						updateDetail(doc);
					})
				});
		}

		function startSnapShotTransaction (uuid, selectedPlayer) {
			//stop previous monitor
			if (snapShotTransaction != null) snapShotTransaction();

			localStorage.setItem('shareSelectedPlayer', selectedPlayer);

			$('#table-confirm-transaction-main').hide();
			//select only one player
			if (selectedPlayer != '')
			{
				snapShotTransaction = collectionTransactions
					.where('uuid', '==', uuid).where('players', 'array-contains', selectedPlayer).orderBy('timestamp')
					.onSnapshot(function(querySnapshot) {
						$('#table-confirm-transaction-main > tbody:last-child').empty();
						querySnapshot.forEach(function(doc) {
							var transactionUuid = doc.data().transactionUuid;
							if ($('#' + transactionUuid).length == 0)
								$('#table-confirm-transaction-main > tbody:last-child').prepend('<tr><td class="align-center" style="font-size: large; vertical-align: middle; color: DarkGray;">' + 
									formatDateddMMHHmm(doc.data().timestamp) + '</td><td><text id="' + transactionUuid + '" class="align-left ' + (doc.data().marked ? 'strike' : '') + 
									'" onclick="onTransactionClick(this,' + doc.data().marked + ');" style="color:' + (doc.data().pay == selectedPlayer ? 'red' : 'blue') + ';">' + doc.data().detail + '</text></td></tr>');
						})
						$('#table-confirm-transaction-main').show();
					});
			}
			//all players 
			else
			{
				snapShotTransaction = collectionTransactions
					.where('uuid', '==', uuid).orderBy('timestamp')
					.onSnapshot(function(querySnapshot) {
						$('#table-confirm-transaction-main > tbody:last-child').empty();
						querySnapshot.forEach(function(doc) {
							var transactionUuid = doc.data().transactionUuid;
							if ($('#' + transactionUuid).length == 0)
								$('#table-confirm-transaction-main > tbody:last-child').prepend('<tr><td class="align-center" style="font-size: large; vertical-align: middle; color: DarkGray;">' + 
									formatDateddMMHHmm(doc.data().timestamp) + '</td><td><text id="' + transactionUuid + '" class="align-left ' + (doc.data().marked ? 'strike' : '') + 
									'" onclick="onTransactionClick(this,' + doc.data().marked + ');">' + doc.data().detail + '</text></td></tr>');
						})
						$('#table-confirm-transaction-main').show();
					});
			}
		}

		function onTransactionClick(element, marked) {
			collectionTransactions.doc(element.id).set ({marked: (marked ? false : true)}, { merge: true });
			if (marked) $(element).removeClass('strike');
			else $(element).addClass('strike');
		}

		function reset () {
			//reset scores and names
			for (var i = 0; i < allPlayers.length; i ++) {
				$('#' + allPlayers[i] + '-scores').text('0');
				$('#' + allPlayers[i] + '-scores').css('color','#3399FF');
				//$('#' + allPlayers[i] + '-player-input').val('');

				$('#' + allPlayers[i] + '-consecutive-win').val(0);
				$('#' + allPlayers[i] + '-consecutive-win-label').text('');
			}

			$('#table-scores-thead tr[id=header-row-2] th').text('');
			$('#table-scores-thead tr[id=header-row-3] th').text('');

			//reset columns color
			$('#header-row-3 th').each(function () {
				$(this).css('color','white');
			});
		}

		function updateBasic (doc) {
			localStorage.setItem('shareGameDataId', $('#code').val());

			console.log(doc.data());

			basic.currentPosition = doc.data().currentPosition;
			basic.currentWind = doc.data().currentWind;
			basic.rowNumberFrom = doc.data().rowNumberFrom;
			basic.rowNumberTo = doc.data().rowNumberTo;
			//basic.confirmTransaction = doc.data().confirmTransaction;
			basic.lastUpdateTime = doc.data().lastUpdateTime;

			basic.e_player_input = doc.data()['e-player-input'];
			basic.s_player_input = doc.data()['s-player-input'];
			basic.w_player_input = doc.data()['w-player-input'];
			basic.n_player_input = doc.data()['n-player-input'];

			basic.e_scores = doc.data()['e-scores'];
			basic.s_scores = doc.data()['s-scores'];
			basic.w_scores = doc.data()['w-scores'];
			basic.n_scores = doc.data()['n-scores'];

			basic.e_consecutive_win = doc.data()['e-consecutive-win'];
			basic.s_consecutive_win = doc.data()['s-consecutive-win'];
			basic.w_consecutive_win = doc.data()['w-consecutive-win'];
			basic.n_consecutive_win = doc.data()['n-consecutive-win'];

			console.log(basic);

			setWindPosition();

			$('#e-scores').text(basic.e_scores == null ? '0' : basic.e_scores);
			$('#s-scores').text(basic.s_scores == null ? '0' : basic.s_scores);
			$('#w-scores').text(basic.w_scores == null ? '0' : basic.w_scores);
			$('#n-scores').text(basic.n_scores == null ? '0' : basic.n_scores);

			$('#e-consecutive-win').val(basic.e_consecutive_win == null || basic.e_consecutive_win == '' ? '0' : basic.e_consecutive_win);
			$('#s-consecutive-win').val(basic.s_consecutive_win == null || basic.s_consecutive_win == '' ? '0' : basic.s_consecutive_win);
			$('#w-consecutive-win').val(basic.w_consecutive_win == null || basic.w_consecutive_win == '' ? '0' : basic.w_consecutive_win);
			$('#n-consecutive-win').val(basic.n_consecutive_win == null || basic.n_consecutive_win == '' ? '0' : basic.n_consecutive_win);

			for (var i = 0; i < allPlayers.length; i ++) {
				if (parseInt($('#' + allPlayers[i] + '-scores').text()) < 0) $('#' + allPlayers[i] + '-scores').css('color','red');

				$('#' + allPlayers[i] + '-consecutive-win-label').text('');
				if ($('#' + allPlayers[i] + '-consecutive-win').val() != '0') $('#' + allPlayers[i] + '-consecutive-win-label').text('連 ' + $('#' + allPlayers[i] + '-consecutive-win').val());
			}

			addPlayers();

			//$('#table-confirm-transaction-main').html(basic.confirmTransaction);
		}

		function setWindPosition() {
			var windPosition = '';
			if (basic.currentWind == 'e-wind') {
				windPosition = windPosition + '東風';
			}
			else if (basic.currentWind == 's-wind') {
				windPosition = windPosition + '南風';
			}
			else if (basic.currentWind == 'w-wind') {
				windPosition = windPosition + '西風';
			}
			else if (basic.currentWind == 'n-wind') {
				windPosition = windPosition + '北風';
			}

			if (basic.currentPosition == 'e-position') {
				windPosition = windPosition + '東局';
			}
			else if (basic.currentPosition == 's-position') {
				windPosition = windPosition + '南局';
			}
			else if (basic.currentPosition == 'w-position') {
				windPosition = windPosition + '西局';
			}
			else if (basic.currentPosition == 'n-position') {
				windPosition = windPosition + '北局';
			}

			$('#wind-position').text(windPosition);
		}

		function addPlayers() {
			$('#table-scores-thead th').each(function () {
				if ($(this).attr('id') == 'e-position') {
					$(this).text(basic.e_player_input);
				};
				if ($(this).attr('id') == 's-position') {
					$(this).text(basic.s_player_input);
				};
				if ($(this).attr('id') == 'w-position') {
					$(this).text(basic.w_player_input);
				};
				if ($(this).attr('id') == 'n-position') {
					$(this).text(basic.n_player_input);
				};

				if ($(this).attr('id') == 'se-pairs' || $(this).attr('id') == 'we-pairs' || $(this).attr('id') == 'ne-pairs') {
					$(this).text(basic.e_player_input);
				};
				if ($(this).attr('id') == 'es-pairs' || $(this).attr('id') == 'ws-pairs' || $(this).attr('id') == 'ns-pairs') {
					$(this).text(basic.s_player_input);
				};
				if ($(this).attr('id') == 'ew-pairs' || $(this).attr('id') == 'sw-pairs' || $(this).attr('id') == 'nw-pairs') {
					$(this).text(basic.w_player_input);
				};
				if ($(this).attr('id') == 'en-pairs' || $(this).attr('id') == 'sn-pairs' || $(this).attr('id') == 'wn-pairs') {
					$(this).text(basic.n_player_input);
				};
			});

			var selected = $('#player').children("option:selected").val();
			if (selected == null) {
				selected = localStorage.getItem('shareSelectedPlayer');
				if (selected == null) selected = '';
			}

			$('#player').empty();
			
			$('#player').append($('<option>', {value: (''), text: ('全部')}));

			$('#player').append($('<option>', {
                value: (basic.e_player_input),
                text: (basic.e_player_input == null ? '東' : basic.e_player_input)
            }));

			$('#player').append($('<option>', {
                value: (basic.s_player_input),
                text: (basic.s_player_input == null ? '南' : basic.s_player_input)
            }));

			$('#player').append($('<option>', {
                value: (basic.w_player_input),
                text: (basic.w_player_input == null ? '西' : basic.w_player_input)
            }));

			$('#player').append($('<option>', {
                value: (basic.n_player_input),
                text: (basic.n_player_input == null ? '北' : basic.n_player_input)
            }));

			$("#player").val(selected).change(function () {
				var selectedPlayer = $('#player').children("option:selected").val();
				if (selectedPlayer == null) selectedPlayer = '';
				startSnapShotTransaction($('#code').val(), selectedPlayer);
			});
		}

		function updateDetail (doc) {
			var field = '';
			var curRow = doc.data()['row'];

			row.mode = doc.data()['mode'];
			row.winner_list = doc.data()['winner-list'];
			row.loser_list = doc.data()['loser-list'];

			console.log(row);

			addRow(curRow, row.mode, 'Y');
			$('#table-scores #' + curRow + ' #winner-list').val(row.winner_list);
			$('#table-scores #' + curRow + ' #loser-list').val(row.loser_list);

			cell.score = 0;
			cell.score_original = 0;
			cell.confirm = '';
			cell.win = '';
			cell.rev = '';
			for (var j = 0; j < allPairs.length; j ++) {
				field = allPairs[j] + '-score';
				cell.score = doc.data()[field];

				field = allPairs[j] + '-score-original';
				cell.score_original = doc.data()[field];

				field = allPairs[j] + '-confirm';
				cell.confirm = doc.data()[field];

				field = allPairs[j] + '-win';
				cell.win = doc.data()[field];

				field = allPairs[j] + '-rev';
				cell.rev = doc.data()[field];

				restoreRow (curRow, allPairs[j]);

				//set background color
				if ($('#table-scores #' + curRow + ' #' + allPairs[j] + '-score').val() == '' || parseInt($('#table-scores #' + curRow + ' #' + allPairs[j] + '-score').val()) <= 0 || $('#table-scores #' + curRow + ' #' + allPairs[j] + '-confirm').val() == 'Y') {
					$('#table-scores #' + curRow + ' #' + allPairs[j] + '-score').css('background-color','#ededed');
				}
				else {
					$('#table-scores #' + curRow + ' #' + allPairs[j] + '-score').css('background-color','#ffffff');
				}

				//set topup fields
				if ($('#table-scores #' + curRow + ' #' + allPairs[j] + '-score').val() == '0' || parseInt($('#table-scores #' + curRow + ' #' + allPairs[j] + '-win').val()) > 1) {
					$('#table-scores #' + curRow + ' #' + allPairs[j] + '-score').css('color','blue');
				};

				//set revenge fields
				if ($('#table-scores #' + curRow + ' #' + allPairs[j] + '-rev').val() == 'Y') {
						$('#table-scores #' + curRow + ' #' + allPairs[j] + '-score').css('color', 'red');
				};
			}

			markWinnerLoser();			
		}

		function addRow(rowNumber, mode, isConfirm) {
			//return if already add
			if ($('#table-scores #' + rowNumber).length > 0) return;

			//Try to get tbody first with jquery children. works faster!
			var tbody = $('#table-scores').children('tbody');

			//Then if no tbody just select your table
			var table = tbody.length ? tbody : $('#table-scores');

			var row = '<tr id="' + rowNumber + '"' + (mode == "adjust" ? ' style="display:none;"' : '') + '><input type="hidden" id="row-confirm" value="' + isConfirm + '"><input type="hidden" id="mode" value="' + mode + '"><input type="hidden" id="winner-list"><input type="hidden" id="loser-list">' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="es-score" readonly><input type="hidden" id="es-score-original"><input type="hidden" id="es-confirm" value="N"><input type="hidden" id="es-win" value="1"><input type="hidden" id="es-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="ew-score" readonly><input type="hidden" id="ew-score-original"><input type="hidden" id="ew-confirm" value="N"><input type="hidden" id="ew-win" value="1"><input type="hidden" id="ew-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="en-score" readonly><input type="hidden" id="en-score-original"><input type="hidden" id="en-confirm" value="N"><input type="hidden" id="en-win" value="1"><input type="hidden" id="en-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="se-score" readonly><input type="hidden" id="se-score-original"><input type="hidden" id="se-confirm" value="N"><input type="hidden" id="se-win" value="1"><input type="hidden" id="se-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="sw-score" readonly><input type="hidden" id="sw-score-original"><input type="hidden" id="sw-confirm" value="N"><input type="hidden" id="sw-win" value="1"><input type="hidden" id="sw-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="sn-score" readonly><input type="hidden" id="sn-score-original"><input type="hidden" id="sn-confirm" value="N"><input type="hidden" id="sn-win" value="1"><input type="hidden" id="sn-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="we-score" readonly><input type="hidden" id="we-score-original"><input type="hidden" id="we-confirm" value="N"><input type="hidden" id="we-win" value="1"><input type="hidden" id="we-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="ws-score" readonly><input type="hidden" id="ws-score-original"><input type="hidden" id="ws-confirm" value="N"><input type="hidden" id="ws-win" value="1"><input type="hidden" id="ws-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="wn-score" readonly><input type="hidden" id="wn-score-original"><input type="hidden" id="wn-confirm" value="N"><input type="hidden" id="wn-win" value="1"><input type="hidden" id="wn-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="ne-score" readonly><input type="hidden" id="ne-score-original"><input type="hidden" id="ne-confirm" value="N"><input type="hidden" id="ne-win" value="1"><input type="hidden" id="ne-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="ns-score" readonly><input type="hidden" id="ns-score-original"><input type="hidden" id="ns-confirm" value="N"><input type="hidden" id="ns-win" value="1"><input type="hidden" id="ns-rev" value="N"></td>' +
				'<td style="padding: 0px;"><input type="number" style="width:100%;text-align:center;" id="nw-score" readonly><input type="hidden" id="nw-score-original"><input type="hidden" id="nw-confirm" value="N"><input type="hidden" id="nw-win" value="1"><input type="hidden" id="nw-rev" value="N"></td>' +
				'</tr>';

			table.append(row);
		}

		function restoreRow(r, c) {
			$('#table-scores #' + r + ' #' + c + '-score').val(cell.score);
			$('#table-scores #' + r + ' #' + c + '-score-original').val(cell.score_original);
			$('#table-scores #' + r + ' #' + c + '-confirm').val(cell.confirm);
			$('#table-scores #' + r + ' #' + c + '-win').val(cell.win);
			$('#table-scores #' + r + ' #' + c + '-rev').val(cell.rev);
		}

		function markWinnerLoser () {
			//Reset all columns
			$('#header-row-3 th').each(function () {
				$(this).css('color','white');
			});

			for (var i = 0; i < halfPairs.length; i ++) {
				searchWinnerLoser (halfPairs[i]);
			}
		}

		function searchWinnerLoser (c) {
			var oppositec = c.charAt(1) + c.charAt(0);

			for (var r = basic.rowNumberTo; r >= basic.rowNumberFrom; r--) {
				//If confirmed, exit
				if ($('#table-scores #' + r + ' #' + c + '-confirm').val() == 'Y') break;

				var score = $('#table-scores #' + r + ' #' + c + '-score').val() == '' ? 0 : parseInt($('#table-scores #' + r + ' #' + c + '-score').val());

				if (score > 0) {
					$('#' + c + '-pairs').css('color','#0d6786');
					$('#' + oppositec + '-pairs').css('color','red');
					break;
				}

				if ($('#table-scores #' + r + ' #' + oppositec + '-confirm').val() == 'Y') break;

				var oppositeScore = $('#table-scores #' + r + ' #' + oppositec + '-score').val() == '' ? 0 : parseInt($('#table-scores #' + r + ' #' + oppositec + '-score').val());

				if (oppositeScore > 0) {
					$('#' + oppositec + '-pairs').css('color','#0d6786');
					$('#' + c + '-pairs').css('color','red');
					break;
				}
			}
		}

		function onClickShare() {
			//Alternative method "https://wa.me/?text=" which is using in iPhone but user experience is not good as whatsapp protocol
			var url = "whatsapp://send?text=";
			var content = '';

			content = '港式台牌 - 局數記錄\r\n' +
						'局數分享\r\n' +
						'http://taiwanmj.htongbiz.net/record_share.html?shareGameDataId=' + $('#code').val() + '\r\n\r\n' +
						'總結\r\n' +
						$('#e-position').text() + ' ' + $('#e-scores').text() + '\r\n' + 
						$('#s-position').text() + ' ' + $('#s-scores').text() + '\r\n' + 
						$('#w-position').text() + ' ' + $('#w-scores').text() + '\r\n' + 
						$('#n-position').text() + ' ' + $('#n-scores').text();

			url = url + encodeURIComponent(content);
			window.open(url);
		}

		async function onClickStatistics() {
			$('#statisticsModalBody').empty();

			//construct tables
			const prefixes = ['e', 's', 'w', 'n'];
			for (const p of prefixes) {
				// wait if function is async
				const html = await generatePlayerStatisticsTable(p);
				$('#statisticsModalBody').append(html);
			}

			//calculate values
			await calculateStatistics();

			$('#statisticsModal').modal('show');
		}

		async function calculateStatistics() {
			//set name
			for (var i = 0; i < allPlayers.length; i ++) {
				var player = $('#' + allPlayers[i] + '-position').text();
				$('[position="' + allPlayers[i] + '-position"]').text(player);
			}

			//sum all details 
			getSumPoints();
			console.log(gameResultDetails);
		}

		async function getSumPoints() {
			var uuid = $('#code').val();
			//reset all to zero 
			gameResultDetails.fill(0);

			const snapshot = await collectionTransactions.where('uuid', '==', uuid).get();
			snapshot.forEach(doc => {
				var data = doc.data();

				for (var i = 0; i < halfPairs.length; i ++) {
					var player = $('#' + String(halfPairs[i]).charAt(0) + '-position').text();
					var counterPlayer = $('#' + String(halfPairs[i]).charAt(1) + '-position').text();

					sum(data, player, counterPlayer, "食糊", i);
					sum(data, player, counterPlayer, "賞罰", i);
					sum(data, player, counterPlayer, "調整", i);
				}
			});

			for (var i = 0; i < halfPairs.length; i ++) {
				//point
				$('#' + String(halfPairs[i]).charAt(0) + String(halfPairs[i]).charAt(1) + '-point').text(gameResultDetails[i * elementsPerRow] - gameResultDetails[i * elementsPerRow + 1]);
				$('#' + String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0) + '-point').text(gameResultDetails[i * elementsPerRow + 1] - gameResultDetails[i * elementsPerRow]);
				//punish
				$('#' + String(halfPairs[i]).charAt(0) + String(halfPairs[i]).charAt(1) + '-punish').text(gameResultDetails[i * elementsPerRow + 2]);
				$('#' + String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0) + '-reward').text(gameResultDetails[i * elementsPerRow + 2] * -1);
				//reward
				$('#' + String(halfPairs[i]).charAt(0) + String(halfPairs[i]).charAt(1) + '-reward').text(gameResultDetails[i * elementsPerRow + 3]);
				$('#' + String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0) + '-punish').text(gameResultDetails[i * elementsPerRow + 3] * -1);
				//adjust
				$('#' + String(halfPairs[i]).charAt(0) + String(halfPairs[i]).charAt(1) + '-adjust').text(gameResultDetails[i * elementsPerRow + 4] - gameResultDetails[i * elementsPerRow + 5]);
				$('#' + String(halfPairs[i]).charAt(1) + String(halfPairs[i]).charAt(0) + '-adjust').text(gameResultDetails[i * elementsPerRow + 5] - gameResultDetails[i * elementsPerRow + 4]);
			}

			const prefixes = ['e', 's', 'w', 'n'];
			for (const p of prefixes) {
				sumTotal(p, 'point');
				sumTotal(p, 'reward');
				sumTotal(p, 'punish');
				sumTotal(p, 'adjust');
			}
		}

		function sum(data, pay, receive, type, i) {
			var j = 0;
			if (type == "賞罰") j = 2;
			else if (type == "調整") j = 4;

			if (data.pay == pay && data.receive == receive && data.type == type) {
				var pos = elementsPerRow * i + j;
				gameResultDetails[pos] -= Number(data.point || 0);
				console.log(pos + ' ' + data.point + ' ' + gameResultDetails[pos]);
			}
			else if (data.pay == receive && data.receive == pay && data.type == type) {
				var pos = elementsPerRow * i + j + 1;
				if (type == "賞罰")		//different handling as it shows breakdown 
					gameResultDetails[pos] += Number(data.point || 0);
				else 
					gameResultDetails[pos] -= Number(data.point || 0);
				console.log(pos + ' ' + data.point + ' ' + gameResultDetails[pos]);
			}
		}

		function sumTotal(prefix, suffix) {
			const columns = ['e', 's', 'w', 'n'].filter(x => x !== prefix);

			let total = 0;
			columns.forEach(col => {
				total += Number($('#' + prefix + col + '-' + suffix).text() || 0);
			});
			$('#' + prefix + '-' + suffix + '-total').text(total);
		}

		function generatePlayerStatisticsTable(prefix) {

			const columns = ['e', 's', 'w', 'n'].filter(x => x !== prefix);

			const rows = [
				{ label: '食糊', suffix: 'point', color: 'black' },
				{ label: '賞', suffix: 'reward', color: '#3399FF' },
				{ label: '罰', suffix: 'punish', color: 'red' },
				{ label: '調整', suffix: 'adjust', color: 'black' }
			];

			let html = '';

			// TABLE START + THEAD
			html += `
				<table class="table table-bordered table-secondary col-12 align-center"
					id="table-${prefix}-statistics"
					cellspacing="0"
					cellpadding="0"
					style="border-collapse: collapse;table-layout: fixed;">

					<thead id="table-${prefix}-scores-thead"
						style="background-color:#3399FF;color:white;">

						<tr class="display-5">
			`;

			html += `
					<th position="${prefix}-position"
						style="padding:5px;width:20%;">
					</th>
				`;

			// dynamic column headers
			columns.forEach(col => {
				html += `
					<th position="${col}-position"
						style="padding:5px;width:20%;">
					</th>
				`;
			});

			// total column
			html += `
					<th style="padding:5px;width:20%;">合計</th>
				</tr>
			</thead>

			<tbody>
			`;

			// ROWS
			rows.forEach(row => {

				html += `
					<tr class="display-5">
						<th style="padding:5px;background-color:white;color:${row.color};width:20%;">
							${row.label}
						</th>
				`;

				columns.forEach(col => {
					html += `
						<th id="${prefix}${col}-${row.suffix}"
							style="padding:5px;background-color:white;color:${row.color};width:20%;">
						</th>
					`;
				});

				html += `
						<th id="${prefix}-${row.suffix}-total"
							style="padding:5px;background-color:white;color:${row.color};width:20%;">
						</th>
					</tr>
				`;
			});

			html += `
					</tbody>
				</table>
				</br>
			`;

			return html;
		}

		$('#statisticsModal .modal-footer button').on('click', function(event) {
			$(this).closest('.modal').on('hidden.bs.modal', function() {
				$(this).off('hidden.bs.modal');	//avoid accumulated call
			});
		})
</script>
